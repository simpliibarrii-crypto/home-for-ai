name: Runtime and Taste Audit

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install, test, and build
        run: |
          npm install
          npm run typecheck
          npm test
          npm run build
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Launch browser showcase and test desktop plus mobile
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > home-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID || true' EXIT
          READY=0
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then READY=1; break; fi
            sleep 1
          done
          test "$READY" = 1 || { cat home-preview.log; exit 1; }
          node <<'JS'
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const errors = [];
            const testPage = async (name, viewport) => {
              const context = await browser.newContext({ viewport });
              const page = await context.newPage();
              page.on('console', message => { if (message.type() === 'error') errors.push(`${name}: ${message.text()}`); });
              page.on('pageerror', error => errors.push(`${name}: ${error.message}`));
              await page.goto('http://127.0.0.1:4173', { waitUntil: 'networkidle' });
              await page.getByRole('heading', { name: /Your intelligence should live somewhere worthy of it/i }).waitFor();
              await page.screenshot({ path: `home-${name}.png`, fullPage: true });
              const body = await page.locator('body').innerText();
              if (!body.includes('HOME//AI') || !body.includes('Evidence before authority')) {
                throw new Error(`${name}: essential product language missing`);
              }
              await context.close();
            };
            await testPage('desktop', { width: 1440, height: 1000 });
            await testPage('mobile', { width: 390, height: 844 });
            await browser.close();
            if (errors.length) throw new Error(`Browser console errors:\n${errors.join('\n')}`);
          })();
          JS
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: home-for-ai-visual-smoke
          path: |
            home-*.png
            home-preview.log

  taste-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify brand, accessibility, and browser-safe runtime
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/App.tsx').read_text(encoding='utf-8')
          css = Path('src/styles/App.css').read_text(encoding='utf-8').lower()
          index_css = Path('src/styles/index.css').read_text(encoding='utf-8').lower()
          combined = css + index_css
          for token in ('#050505', '#c8273f', '#c9ad7d', '#f4efe7'):
              assert token in combined, f'missing canonical brand token {token}'
          assert '__TAURI_INTERNALS__' in app, 'browser-safe runtime detection missing'
          assert 'showcase' in app.lower(), 'browser showcase mode missing'
          assert 'prefers-reduced-motion' in combined
          assert '#a78bfa' not in combined and '#6d7cff' not in combined
          print('Home for AI taste contract passed.')
          PY

  backend-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install and compile backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall -q .
      - name: Run backend tests with diagnostic log
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee backend-test.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: home-backend-diagnostic
          path: backend/backend-test.log

  rust-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Check workspace with diagnostic log
        run: |
          set -o pipefail
          cargo check --workspace 2>&1 | tee rust-check.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: home-rust-diagnostic
          path: rust-check.log

  secret-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run redacted Gitleaks diagnostic
        run: |
          set -o pipefail
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source=/repo --redact --verbose 2>&1 | tee gitleaks-redacted.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: home-gitleaks-diagnostic
          path: gitleaks-redacted.log
