name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    if: hashFiles('backend/requirements.txt') != ''
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test_home_for_ai.db
      ENVIRONMENT: test
      JWT_SECRET_KEY: test-secret-change-me
      OPENROUTER_API_KEY: test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import check
        run: python -m compileall .
      - name: Tests
        run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm test --if-present

  rust:
    name: Rust check
    runs-on: ubuntu-latest
    if: hashFiles('Cargo.toml') != '' || hashFiles('src-tauri/Cargo.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check Tauri
        if: hashFiles('src-tauri/Cargo.toml') != ''
        run: cargo check --manifest-path src-tauri/Cargo.toml

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v3
