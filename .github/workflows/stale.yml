name: Stale issues and PRs

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed if no further activity occurs
            within 7 days. Thank you for your contributions.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed if no further activity
            occurs within 7 days. Thank you for your contributions.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. Please
            feel free to reopen if the issue persists.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Please feel free to reopen if needed.
          days-before-stale: 60
          days-before-close: 7
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,enhancement"
          exempt-pr-labels: "pinned,security,dependencies"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
