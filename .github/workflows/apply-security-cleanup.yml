name: Apply Security Cleanup

on:
  push:
    branches: [audit/runtime-taste-2026-07]
    paths:
      - scripts/one_time_security_cleanup.py
      - .github/workflows/apply-security-cleanup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/runtime-taste-2026-07
      - name: Apply exact source migration
        run: python scripts/one_time_security_cleanup.py
      - name: Commit migration result
        run: |
          if git diff --quiet; then
            echo 'No migration changes remain.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ui/server/storage.ts gateway/api/routes.go
          git commit -m 'security: remove legacy credential fixtures'
          git push origin HEAD:audit/runtime-taste-2026-07
